site:
  title: Example Site
  subtitle: A neutral Colophon scaffold with runnable examples.
  description: A plain demo site generated from YAML, Markdown, Jinja templates, and trusted local Python.
  url: https://example.test
  author: Your Name
  signal_line:
    REVISION: python::build_revision
    AUTHOR: "{{ site.author }}"
  nav:
    - label: Home
      href: /
    - label: About
      href: /about/
    - label: Features
      href: /features/
    - label: Variables
      href: /template-variables/
    - label: Images
      href: /images/
    - label: Hooks
      href: /hooks/
    - label: Deploy
      href: /deploy/
    - label: Archive
      href: /archive/
  footer:
    brand: Example Site
    links:
      - label: Colophon
        href: https://github.com/AeonCypher/Colophon
      - label: RSS
        href: /feed.xml
      - label: Demo tag
        href: /tags/demo/
  mastodon:
    enabled: false
    host: social.example
    user: example
    timeline:
      enabled: false

templates:
  default: index.html
  page: index.html
  post: post.html
  static: simple.html

routes:
  - match: /posts/**
    template: post
  - match: /**
    template: page
