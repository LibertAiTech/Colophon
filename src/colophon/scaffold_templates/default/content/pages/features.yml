template: static
title: Feature tour
summary: A YAML page that lists concrete Colophon features using structured data.
doc_sections:
  - heading: Project config
    text: colophon.yml is the root of a site. Its paths point to content, templates, static assets, build output, deploy config, and Python hook modules.
    code: |
      paths:
        content: content
        templates: templates
        static: static
        output: _site
      python:
        modules:
          - site_hooks.py
  - heading: Content types
    text: content/index.yml renders the homepage, content/pages/about.md renders /about/, and content/posts/hello-world.md renders /posts/hello-world/.
    items:
      - YAML pages are useful for structured page data.
      - Markdown pages provide front matter plus article content.
      - Support files such as images.yml and deploy.example.yaml do not create routes.
  - heading: Collections and feeds
    text: Listed posts are exposed through collections.posts, /archive/, /tags/<tag>/, and /feed.xml.
    code: |
      collections:
        posts:
          under: /posts/
          sort: date desc
  - heading: Mastodon integration
    text: site.mastodon and mastodon_comments are loaded for templates without fetching remote data during build.
    code: |
      mastodon_comments:
        status_url: https://social.example/@example/123456
  - heading: Serve and watch
    text: colophon serve --watch rebuilds when content, templates, static assets, the config file, or declared Python modules change.
